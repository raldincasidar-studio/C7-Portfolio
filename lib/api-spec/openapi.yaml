openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: C7 Convenience Store API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: products
    description: Product operations
  - name: categories
    description: Category operations
  - name: locations
    description: Store location operations
  - name: jobs
    description: Career/job operations
  - name: contact
    description: Contact form operations
  - name: orders
    description: Order operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List all products
      parameters:
        - name: categoryId
          in: query
          schema:
            type: ["integer", "null"]
        - name: search
          in: query
          schema:
            type: ["string", "null"]
        - name: featured
          in: query
          schema:
            type: ["boolean", "null"]
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List product categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"

  /locations:
    get:
      operationId: listLocations
      tags: [locations]
      summary: List all store locations
      responses:
        "200":
          description: List of store locations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Location"

  /locations/{id}:
    get:
      operationId: getLocation
      tags: [locations]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Location detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Location"
        "404":
          description: Not found

  /jobs:
    get:
      operationId: listJobs
      tags: [jobs]
      summary: List job openings
      responses:
        "200":
          description: List of job openings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Job"

  /contact:
    post:
      operationId: submitContact
      tags: [contact]
      summary: Submit a contact form message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactInput"
      responses:
        "201":
          description: Contact message submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactResult"
        "400":
          description: Validation error

  /orders:
    post:
      operationId: createOrder
      tags: [orders]
      summary: Place a new order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderInput"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: Validation error

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Not found

  /stats:
    get:
      operationId: getStats
      tags: [products]
      summary: Get store stats (total products, locations, categories)
      responses:
        "200":
          description: Store stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoreStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Product:
      type: object
      required: [id, name, price, categoryId, categoryName, inStock]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        price:
          type: number
        imageUrl:
          type: ["string", "null"]
        categoryId:
          type: integer
        categoryName:
          type: string
        inStock:
          type: boolean
        featured:
          type: boolean
        brand:
          type: ["string", "null"]

    Category:
      type: object
      required: [id, name, description, imageUrl]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        imageUrl:
          type: ["string", "null"]
        productCount:
          type: integer

    Location:
      type: object
      required: [id, name, address, landmark, hours, mapsUrl]
      properties:
        id:
          type: integer
        name:
          type: string
        address:
          type: string
        landmark:
          type: string
        hours:
          type: string
        mapsUrl:
          type: string
        lat:
          type: ["number", "null"]
        lng:
          type: ["number", "null"]

    Job:
      type: object
      required: [id, title, requirements]
      properties:
        id:
          type: integer
        title:
          type: string
        requirements:
          type: string
        type:
          type: string
        location:
          type: string

    ContactInput:
      type: object
      required: [name, email, subject, message]
      properties:
        name:
          type: string
        email:
          type: string
        subject:
          type: string
        message:
          type: string

    ContactResult:
      type: object
      required: [success, message]
      properties:
        success:
          type: boolean
        message:
          type: string

    OrderItem:
      type: object
      required: [productId, quantity]
      properties:
        productId:
          type: integer
        quantity:
          type: integer

    OrderInput:
      type: object
      required: [customerName, customerEmail, customerPhone, items, locationId]
      properties:
        customerName:
          type: string
        customerEmail:
          type: string
        customerPhone:
          type: string
        locationId:
          type: integer
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        notes:
          type: ["string", "null"]

    Order:
      type: object
      required: [id, customerName, customerEmail, customerPhone, locationId, status, total, items, createdAt]
      properties:
        id:
          type: integer
        customerName:
          type: string
        customerEmail:
          type: string
        customerPhone:
          type: string
        locationId:
          type: integer
        status:
          type: string
        total:
          type: number
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        notes:
          type: ["string", "null"]
        createdAt:
          type: string

    StoreStats:
      type: object
      required: [totalProducts, totalLocations, totalCategories, featuredProductCount]
      properties:
        totalProducts:
          type: integer
        totalLocations:
          type: integer
        totalCategories:
          type: integer
        featuredProductCount:
          type: integer
