kind = "web"
previewPath = "/"
title = "C7 Convenience Store"
version = "1.0.0"
id = "artifacts/c7-store"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18754

[services.development]
run = "pnpm --filter @workspace/c7-store run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/c7-store", "run", "build" ]
publicDir = "artifacts/c7-store/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18754"
BASE_PATH = "/"
